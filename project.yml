name: Remindly
options:
  bundleIdPrefix: com.remindly
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: 5.9
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  Remindly:
    type: application
    platform: iOS
    sources:
      - path: Remindly
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.remindly.app
        INFOPLIST_FILE: Remindly/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    info:
      path: Remindly/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        BGTaskSchedulerPermittedIdentifiers:
          - com.remindly.app.spamRefresh
        UIBackgroundModes:
          - fetch
    entitlements:
      path: Remindly/Remindly.entitlements
      properties: {}

  RemindlyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RemindlyTests
    dependencies:
      - target: Remindly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.remindly.tests
        GENERATE_INFOPLIST_FILE: YES
